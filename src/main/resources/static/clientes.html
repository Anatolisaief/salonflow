        <button

                type="button"

                data-bs-toggle="collapse"

                data-bs-target="#navbar">

            <span class="navbar-toggler-icon">

            </span>

        </button>


        <div class="collapse navbar-collapse"
             id="navbar">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link active"
                       href="clientes.html">

                        Clientes

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="empleados.html">

<!-- MAIN -->

<main class="container my-5">


    <!-- TITULO -->

    <h1 class="mb-4">

        Clientes

    </h1>


    <!-- FORMULARIO -->

    <div class="card">

        <div class="card-header">

            Crear cliente

        </div>

        <div class="card-body">

            <form id="formularioCliente">

                <div class="mb-3">

                    <label
                            for="nombre"

                            class="form-label">

                        Nombre

                    </label>

                    <input

                            type="text"

                            class="form-control"

                            id="nombre"

                            required>

                </div>


                <div class="mb-3">

                    <label

                            for="telefono"

                            class="form-label">

                        Teléfono

                    </label>

                    <input

                            type="text"

                            class="form-control"

                            id="telefono"

                            required>

                </div>


                <div class="mb-3">

                    <label

                            for="email"

                            class="form-label">

                        Email

                    </label>

                    <input

                            type="email"

                            class="form-control"

                            id="email"

                            required>

                </div>


                <button type="submit" class="btn btn-primary" id="botonGuardarCliente">
                    Crear cliente
                </button>

                <button type="button" class="btn btn-secondary d-none" id="botonCancelarEdicion">
                    Cancelar edición
                </button>

            </form>

        </div>

    </div>



    <!-- TABLA -->

    <div class="card mt-5">

        <div class="card-header">

            Lista de clientes

        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Nombre</th>

                    <th>Teléfono</th>

                    <th>Email</th>
                    <th>Acciones</th>

                </tr>

                </thead>


                <tbody id="tablaClientes">

                <!-- Los clientes aparecerán aquí -->

                </tbody>

            </table>

        </div>

    </div>


</main>


<!-- FOOTER -->

        class="bg-dark

               text-white

               text-center

               py-3

               mt-5">
