<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>
        Clientes | SalonFlow
    </title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="css/style.css">
</head>

<body>

<!-- NAVBAR -->

<div id="header"></div>


<!-- MAIN -->

<main class="container my-5">

    <!-- TITULO -->

    <h1 class="mb-4">Clientes</h1>

    <div id="contenedorAlertas"></div>
    <!-- FORMULARIO -->

    <div class="card">
        <div class="card-header">
            Crear cliente
        </div>
        <div class="card-body">
            <form id="formularioCliente">
                <div class="mb-3">
                    <label
                            for="nombre"
                            class="form-label">
                        Nombre
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            required>
                </div>


                <div class="mb-3">
                    <label
                            for="telefono"
                            class="form-label">
                        Teléfono
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="telefono"
                            required>
                </div>


                <div class="mb-3">
                    <label
                            for="email"
                            class="form-label">
                        Email
                    </label>
                    <input
                            type="email"
                            class="form-control"
                            id="email"
                            required>
                </div>
                <div class="mb-3">
                    <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                    <input type="date" class="form-control" id="fechaNacimiento">
                </div>

                <div class="mb-3">
                    <label for="alergias" class="form-label">Alergias</label>
                    <input type="text" class="form-control" id="alergias">
                </div>

                <div class="mb-3">
                    <label for="observaciones" class="form-label">Observaciones</label>
                    <textarea class="form-control" id="observaciones" rows="3"></textarea>
                </div>


                <button type="submit" class="btn btn-primary" id="botonGuardarCliente">
                    Crear cliente
                </button>

                <button type="button" class="btn btn-secondary d-none" id="botonCancelarEdicion">
                    Cancelar edición
                </button>
            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">
            Buscar clientes
        </div>

        <div class="card-body">
            <div class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label for="tipoBusqueda" class="form-label">Buscar por</label>

                    <select class="form-select" id="tipoBusqueda">
                        <option value="nombre">Nombre</option>
                        <option value="telefono">Teléfono</option>
                        <option value="email">Email</option>
                        <option value="id">ID</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="textoBusqueda" class="form-label">Valor de búsqueda</label>

                    <input
                            type="text"
                            class="form-control"
                            id="textoBusqueda"
                            placeholder="Ej: Ana, 612345678, ana@gmail.com o 1">
                </div>

                <div class="col-md-3">
                    <button class="btn btn-filtro w-100 mb-2" id="botonBuscarCliente">
                        Buscar
                    </button>

                    <button class="btn btn-mostrar w-100" id="botonMostrarTodos">
                        Mostrar todos
                    </button>
                </div>

            </div>
        </div>
    </div>



    <!-- TABLA -->

    <div class="card mt-5">
        <div class="card-header">
            Lista de clientes
        </div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Fecha nacimiento</th>
                    <th>Acciones</th>
                </tr>
                </thead>


                <tbody id="tablaClientes">
                <!-- Los clientes aparecerán aquí -->
                </tbody>
            </table>
        </div>
    </div>


</main>


<!-- FOOTER -->
<div id="footer"></div>

<script src="js/layout.js"></script>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>
<script src="js/utils.js"></script>
<script src="js/clientes.js">
</script>
</body>
</html>
