<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<script src="js/index.js"></script>

<body>

<!-- HEADER -->

<div id="header"></div>


<!-- BODY -->

<main class="container text-center my-5">
    <h1 class="display-3 fw-bold">
        SalonFlow
    </h1>

    <p class="lead mt-4">

        Aplicación web para la gestión de peluquerías desarrollada con
        Spring Boot, Hibernate y PostgreSQL.

    </p>

    <section class="container my-5">

        <h2 class="mb-4 text-center">Panel principal</h2>

        <div class="row g-3">

            <!-- Clientes -->

            <div class="col-md-4">
                <a href="clientes.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Clientes</h5>
                            <p class="display-6" id="totalClientes">0</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Empleados -->

            <div class="col-md-4">
                <a href="empleados.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Empleados</h5>
                            <p class="display-6" id="totalEmpleados">0</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Servicios -->

            <div class="col-md-4">
                <a href="servicios.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Servicios</h5>
                            <p class="display-6" id="totalServicios">0</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Citas -->

            <div class="col-md-4">
                <a href="citas.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Citas</h5>
                            <p class="display-6" id="totalCitas">0</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Productos -->

            <div class="col-md-4">
                <a href="productos.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Productos</h5>
                            <p class="display-6" id="totalProductos">0</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Promociones -->

            <div class="col-md-4">
                <a href="promociones.html" class="text-decoration-none text-dark">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <h5>Promociones</h5>
                            <p class="display-6" id="totalPromociones">0</p>
                        </div>
                    </div>
                </a>
            </div>

        </div>

    </section>



</main>


<!-- FOOTER -->

<div id="footer"></div>

<script src="js/layout.js"></script>
<script src="js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
