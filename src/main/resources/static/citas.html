<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SalonFlow</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="empleados.html">Empleados</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link active" href="citas.html">Citas</a></li>
                <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">

    <h1 class="mb-4">Citas</h1>

    <div class="card">
        <div class="card-header">Crear cita</div>

        <div class="card-body">
            <form id="formularioCita">

                <div class="mb-3">
                    <label for="fechaHora" class="form-label">Fecha y hora</label>
                    <input type="datetime-local" class="form-control" id="fechaHora" required>
                </div>

                <div class="mb-3">
                    <label for="estado" class="form-label">Estado</label>
                    <select class="form-select" id="estado" required>
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="CONFIRMADA">CONFIRMADA</option>
                        <option value="CANCELADA">CANCELADA</option>
                        <option value="REALIZADA">REALIZADA</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="clienteId" class="form-label">Cliente</label>
                    <select class="form-select" id="clienteId" required>
                        <option value="">Selecciona un cliente</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="empleadoId" class="form-label">Empleado</label>
                    <select class="form-select" id="empleadoId" required>
                        <option value="">Selecciona un empleado</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="servicioId" class="form-label">Servicio</label>
                    <select class="form-select" id="servicioId" required>
                        <option value="">Selecciona un servicio</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Crear cita</button>

            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de citas</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha y hora</th>
                    <th>Estado</th>
                    <th>Cliente</th>
                    <th>Empleado</th>
                    <th>Servicio</th>
                </tr>
                </thead>

                <tbody id="tablaCitas">
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
    © 2026 SalonFlow
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/citas.js"></script>

</body>
</html>
