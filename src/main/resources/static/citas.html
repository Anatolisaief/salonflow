<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header"></div>

<main class="container my-5">

    <h1 class="mb-4">Citas</h1>
    <div id="contenedorAlertas"></div>

    <div class="card">
        <div class="card-header">Crear cita</div>

        <div class="card-body">
            <form id="formularioCita">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label for="fechaHora" class="form-label">Fecha y hora</label>
                        <input type="datetime-local"
                               class="form-control"
                               id="fechaHora"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="estado" class="form-label">Estado</label>
                        <select class="form-select" id="estado" required>
                            <option value="PENDIENTE">PENDIENTE</option>
                            <option value="CONFIRMADA">CONFIRMADA</option>
                            <option value="CANCELADA">CANCELADA</option>
                            <option value="REALIZADA">REALIZADA</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="clienteId" class="form-label">Cliente</label>
                        <select class="form-select" id="clienteId" required>
                            <option value="">Selecciona un cliente</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="empleadoId" class="form-label">Empleado</label>
                        <select class="form-select" id="empleadoId" required>
                            <option value="">Selecciona un empleado</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="servicioId" class="form-label">Servicio</label>
                        <select class="form-select" id="servicioId" required>
                            <option value="">Selecciona un servicio</option>
                        </select>
                    </div>

                </div>

                <div class="text-end mt-3">

                    <button type="submit"
                            class="btn btn-primary"
                            id="botonGuardarCita">
                        Crear cita
                    </button>

                    <button type="button"
                            class="btn btn-secondary d-none"
                            id="botonCancelarEdicion">
                        Cancelar edición
                    </button>

                </div>

            </form>
        </div>
    </div>

    <div class="card mt-5">

        <div class="card-header">

            Buscar citas

        </div>

        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="tipoBusqueda"
                           class="form-label">
                        Buscar por
                    </label>
                    <select class="form-select"
                            id="tipoBusqueda">
                        <option value="estado">Estado</option>
                        <option value="cliente">Cliente</option>
                        <option value="empleado">Empleado</option>
                        <option value="id">ID</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="textoBusqueda"
                           class="form-label">
                        Valor de búsqueda
                    </label>
                    <input
                            type="text"
                            class="form-control"
                            id="textoBusqueda"
                            placeholder="Ej: PENDIENTE, Ana o 1">
                </div>


                <div class="col-md-3">
                    <button
                            class="btn btn-filtro w-100 mb-2"
                            id="botonBuscarCita">
                        Buscar
                    </button>

                    <button
                            class="btn btn-mostrar w-100"
                            id="botonMostrarTodas">
                        Mostrar todas
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de citas</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha y hora</th>
                    <th>Estado</th>
                    <th>Cliente</th>
                    <th>Empleado</th>
                    <th>Servicio</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tablaCitas">
                </tbody>
            </table>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="js/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/citas.js"></script>

</body>
</html>
