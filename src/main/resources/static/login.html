<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-4" style="max-width:420px;width:100%;border-radius:20px;">

        <div class="text-center mb-4">

            <img src="img/logo.png" alt="SalonFlow" width="90">

            <h2 class="mt-3">SalonFlow</h2>

            <p class="text-muted">
                Inicia sesión para continuar
            </p>
            <div class="alert alert-danger" id="error" style="display:none;">
                Usuario o contraseña incorrectos.
            </div>

            <div class="alert alert-success" id="logout" style="display:none;">
                Has cerrado sesión correctamente.
            </div>

        </div>

        <form method="post" action="/login">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input
                        type="text"
                        class="form-control"
                        name="username"
                        required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input
                        type="password"
                        class="form-control"
                        name="password"
                        required>
            </div>

            <button class="btn btn-primary w-100">
                Iniciar sesión
            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);

    if (params.has("error")) {
        document.getElementById("error").style.display = "block";
    }

    if (params.has("logout")) {
        document.getElementById("logout").style.display = "block";
    }
</script>

</body>
</html>
