<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header"></div>

<main class="container my-5">

    <h1 class="mb-4">Promociones</h1>
    <div id="contenedorAlertas"></div>

    <div class="card">
        <div class="card-header">Crear promoción</div>

        <div class="card-body">
            <form id="formularioPromocion">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input
                                type="text"
                                class="form-control"
                                id="nombre"
                                required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="descuento" class="form-label">Descuento (%)</label>
                        <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                id="descuento"
                                required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="fechaInicio" class="form-label">Fecha inicio</label>
                        <input
                                type="date"
                                class="form-control"
                                id="fechaInicio"
                                required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="fechaFin" class="form-label">Fecha fin</label>
                        <input
                                type="date"
                                class="form-control"
                                id="fechaFin"
                                required>
                    </div>

                    <div class="col-12 mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea
                                class="form-control"
                                id="descripcion"
                                rows="3"
                                required></textarea>
                    </div>

                    <div class="col-12 mb-3">
                        <label for="serviciosIds" class="form-label">Servicios</label>
                        <select class="form-select" id="serviciosIds" multiple required></select>
                        <div class="form-text">
                            Selecciona uno o varios servicios para la promoción.
                        </div>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-3">

                    <button
                            type="button"
                            class="btn btn-secondary d-none"
                            id="botonCancelarEdicion">
                        Cancelar edición
                    </button>

                    <button
                            type="submit"
                            class="btn btn-primary"
                            id="botonGuardarPromocion">
                        Crear promoción
                    </button>

                </div>

            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de promociones</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Descuento</th>
                    <th>Servicios</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tablaPromociones">
                </tbody>
            </table>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="js/layout.js"></script>
<script src="js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="js/promociones.js"></script>

</body>
</html>
