<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header"></div>

<main class="container my-5">

    <h1 class="mb-4">Servicios</h1>

    <div class="card">
        <div class="card-header">Crear servicio</div>

        <div class="card-body">
            <form id="formularioServicio">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="precio" required>
                </div>

                <div class="mb-3">
                    <label for="duracion" class="form-label">Duración en minutos</label>
                    <input type="number" class="form-control" id="duracion" required>
                </div>

                <button type="submit" class="btn btn-primary" id="botonGuardarServicio">
                    Crear servicio
                </button>

                <button type="button" class="btn btn-secondary d-none" id="botonCancelarEdicion">
                    Cancelar edición
                </button>

            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de servicios</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Duración</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tablaServicios">
                </tbody>
            </table>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="js/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/servicios.js"></script>

</body>
</html>
