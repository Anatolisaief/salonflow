<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Ficha cliente | SalonFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header"></div>
<main class="container my-5">
    <h1 class="mb-4">Ficha del cliente</h1>
    <div id="contenedorAlertas"></div>
    <div class="row g-4 mb-5">
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header">Datos del cliente</div>
                <div class="card-body" id="datosCliente"></div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">Añadir historial</div>
                <div class="card-body">
            <form id="formularioHistorial">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label for="fecha" class="form-label">Fecha</label>
                        <input type="date" class="form-control" id="fecha">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="servicioId" class="form-label">Servicio</label>
                        <select class="form-select" id="servicioId">
                            <option value="">Sin servicio seleccionado</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="tecnica" class="form-label">Técnica</label>
                        <input type="text" class="form-control" id="tecnica">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="colorAplicado" class="form-label">Color aplicado</label>
                        <input type="text" class="form-control" id="colorAplicado">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="productosAplicados" class="form-label">Productos aplicados</label>
                        <input type="text" class="form-control" id="productosAplicados">
                    </div>

                    <div class="col-12 mb-3">
                        <label for="observacionesHistorial" class="form-label">Observaciones</label>
                        <textarea
                                class="form-control"
                                id="observacionesHistorial"
                                rows="3"></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-3">

                    <button
                            type="button"
                            class="btn btn-secondary d-none"
                            id="botonCancelarEdicionHistorial">
                        Cancelar edición
                    </button>

                    <button
                            type="submit"
                            class="btn btn-primary"
                            id="botonGuardarHistorial">
                        Añadir historial
                    </button>

                </div>

            </form>
                </div>
            </div>
        </div>

    </div>
    </div>
    <div class="card">
        <div class="card-header">Historial del cliente</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Servicio</th>
                    <th>Técnica</th>
                    <th>Color</th>
                    <th>Productos</th>
                    <th>Observaciones</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaHistorial"></tbody>
            </table>
        </div>
    </div>
</main>
<div id="footer"></div>
<script src="js/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/cliente-detalle.js"></script>
</body>
</html>
