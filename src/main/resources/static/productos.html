<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SalonFlow</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="clientes.html">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="empleados.html">Empleados</a></li>
                <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" href="citas.html">Citas</a></li>
                <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">

    <h1 class="mb-4">Productos</h1>

    <div class="card">
        <div class="card-header">Crear producto</div>

        <div class="card-body">
            <form id="formularioProducto">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="marca" class="form-label">Marca</label>
                    <input type="text" class="form-control" id="marca" required>
                </div>

                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="precio" required>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" required>
                </div>

                <button
                        type="submit"

                        class="btn btn-primary"

                        id="botonGuardarProducto">

                    Crear producto

                </button>


                <button

                        type="button"

                        class="btn btn-secondary d-none"

                        id="botonCancelarEdicion">

                    Cancelar edición

                </button>

            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Buscar productos</div>

        <div class="card-body">
            <div class="row g-3">

                <div class="col-md-6">
                    <label for="buscarNombre" class="form-label">Buscar por nombre</label>
                    <input type="text" class="form-control" id="buscarNombre" placeholder="Ej: champu">
                </div>

                <div class="col-md-6">
                    <label for="buscarMarca" class="form-label">Buscar por marca</label>
                    <input type="text" class="form-control" id="buscarMarca" placeholder="Ej: L'Oreal">
                </div>

                <div class="col-12">
                    <button class="btn btn-secondary" id="botonBuscarNombre">Buscar por nombre</button>
                    <button class="btn btn-secondary" id="botonBuscarMarca">Buscar por marca</button>
                    <button class="btn btn-outline-dark" id="botonMostrarTodos">Mostrar todos</button>
                </div>

            </div>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de productos</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Marca</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tablaProductos">
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
    © 2026 SalonFlow
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/productos.js"></script>

</body>
</html>
