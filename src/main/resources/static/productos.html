<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | SalonFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header"></div>

<main class="container my-5">

    <h1 class="mb-4">Productos</h1>

    <div class="card">
        <div class="card-header">Crear producto</div>

        <div class="card-body">
            <form id="formularioProducto">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="marca" class="form-label">Marca</label>
                    <input type="text" class="form-control" id="marca" required>
                </div>

                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="precio" required>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" required>
                </div>

                <button
                        type="submit"

                        class="btn btn-primary"

                        id="botonGuardarProducto">

                    Crear producto

                </button>


                <button

                        type="button"

                        class="btn btn-secondary d-none"

                        id="botonCancelarEdicion">

                    Cancelar edición

                </button>

            </form>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Buscar productos</div>

        <div class="card-body">
            <div class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label for="tipoBusqueda" class="form-label">Buscar por</label>
                    <select class="form-select" id="tipoBusqueda">
                        <option value="nombre">Nombre</option>
                        <option value="marca">Marca</option>
                        <option value="id">ID</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="textoBusqueda" class="form-label">Valor de búsqueda</label>
                    <input type="text" class="form-control" id="textoBusqueda" placeholder="Ej: champú, L'Oréal o 1">
                </div>

                <div class="col-md-3">
                    <button class="btn btn-filtro w-100 mb-2" id="botonBuscarProducto">
                        Buscar
                    </button>

                    <button class="btn btn-mostrar w-100" id="botonMostrarTodos">
                        Mostrar todos
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div class="card mt-5">
        <div class="card-header">Lista de productos</div>

        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Marca</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody id="tablaProductos">
                </tbody>
            </table>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="js/layout.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/productos.js"></script>

</body>
</html>
